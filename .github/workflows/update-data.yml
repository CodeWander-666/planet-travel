name: Update Train Data (Live + Routes)
on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install requests beautifulsoup4
      - run: python automation/scrape_live_status.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🚂 Update live train data & routes"
          file_pattern: "train-status/ datasets/train-routes/"
