<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Tatkal Enquiry – Personal Concierge | Planet&Travel</title><meta name="description" content="Request Tatkal ticket assistance. Our travel architects will confirm availability within 2 hours."><link rel="stylesheet" href="css/luxury.css"></head><body><header class="main-header"><nav class="luxury-nav"><a href="/planet-travel/" class="nav-logo">Planet&Travel</a></nav></header><main style="margin-top:120px; padding:2rem;"><h1 class="gold-heading">Tatkal Platinum Concierge</h1><p>Submit your request and we’ll secure your seat with utmost priority.</p><form onsubmit="sendTatkalEmail();return false"><input type="text" id="train" placeholder="Train Number"><input type="date" id="date"><button class="btn-gold">Request Tatkal</button></form><script>function sendTatkalEmail(){const t=document.getElementById('train').value;const d=document.getElementById('date').value;window.location.href=`mailto:tatkal@planetandtravel.in?subject=Tatkal%20Request%20-%20${t}%20-%20${d}&body=Please%20check%20availability%20for%20train%20${t}%20on%20${d}.`}</script></main></body></html>
