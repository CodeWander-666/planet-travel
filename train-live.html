<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Live Train | Planet&Travel</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="css/luxury.css"><style>.train-map{height:70vh;}</style>
</head><body><nav class="nav-luxury"><a href="/planet-travel/" class="nav-logo">Planet&Travel</a></nav>
<main style="margin-top:100px;"><div id="map" class="train-map"></div>
<div id="info" class="glass" style="padding:1rem;margin:1rem;">Loading train data...</div></main>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const p = new URLSearchParams(window.location.search); const tn = p.get('train'); const info = document.getElementById('info');
if (!tn) info.innerHTML = 'No train specified.';
const map = L.map('map').setView([23.5, 78.5], 6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB', subdomains: 'abcd', maxZoom: 19 }).addTo(map);
let markers = [];

async function update() {
  try {
    const response = await fetch(`https://indian-railway-api.cyclic.app/trains/getTrain/?trainNo=${tn}`);
    const d = await response.json();
    if (d.success && d.data) {
      const t = d.data;
      info.innerHTML = `<h2>${t.trainName} (${t.trainNo})</h2>
        <p><strong>Status:</strong> ${t.statusNote || t.status}</p>
        <p><strong>Location:</strong> ${t.currentStationName || 'N/A'}</p>
        <p><small>Updated: ${new Date().toLocaleTimeString()}</small></p>`;
      markers.forEach(m => map.removeLayer(m)); markers = [];
      // Use station coordinates from a lookup (we include a small map in the script)
      const coordLookup = { 'GWL':[26.2183,78.1828], 'INDB':[22.7196,75.8577], 'BPL':[23.2599,77.4126], 'NDLS':[28.6419,77.2194] };
      const code = (t.currentStationCode || '').trim();
      const coords = coordLookup[code] || [23.5, 78.5];
      const icon = L.divIcon({ className: 'gold-train-icon', html: '<div style="font-size:24px;">🚂</div>', iconSize: [30,30], iconAnchor: [15,15] });
      markers.push(L.marker(coords, { icon }).addTo(map).bindPopup(t.trainName));
    } else {
      info.innerHTML = '<p>Train not found or data unavailable. <a href="/planet-travel/concierge.html">Ask our concierge</a>.</p>';
    }
  } catch (e) {
    info.innerHTML = '<p>Error fetching live data. Please try again.</p>';
  }
}
update();
setInterval(update, 30000);
</script></body></html>
