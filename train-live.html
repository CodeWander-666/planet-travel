<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Live Train Tracking | Planet&Travel</title><link rel="stylesheet" href="css/luxury.css"></head><body><nav class="nav-luxury"><a href="/planet-travel/" class="nav-logo">Planet&Travel</a><div class="nav-links"><a href="/planet-travel/train.html">Search</a><a href="/planet-travel/concierge.html">Concierge</a></div></nav><main class="journey-container"><div id="train-header" class="glass" style="padding:1rem;margin-bottom:1rem;text-align:center"><h2>Loading...</h2><p id="live-status"></p></div><div id="journey-list" class="loading">Loading journey data...</div></main><footer><p>© 2026 Planet&Travel</p></footer><script>
const params = new URLSearchParams(window.location.search);
const trainNo = params.get('train');
if (!trainNo) document.getElementById('train-header').innerHTML = '<h2>No train number provided</h2>';

let stationsData = [];
let currentStationName = '';

// Load station database (for coordinates, optional)
fetch('/planet-travel/datasets/all-india-stations-with-coords.json')
  .then(r => r.json()).then(d => stationsData = d).catch(() => {});

// Fetch route schedule from RunningStatus.in via CORS proxy
async function loadRoute() {
  const listDiv = document.getElementById('journey-list');
  try {
    const url = `https://corsproxy.io/?${encodeURIComponent('https://runningstatus.in/status/'+trainNo)}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('Failed to fetch route');
    const html = await resp.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const table = doc.querySelector('table');
    if (!table) throw new Error('No timetable table found');

    const rows = table.querySelectorAll('tr');
    const stations = [];
    // Parse rows: skip header if present
    for (let row of rows) {
      const cols = row.querySelectorAll('td');
      if (cols.length < 4) continue;
      // Column 0: Station Name, 1: Scheduled Arrival, 2: Scheduled Departure, 3: Platform
      const name = cols[0].textContent.trim();
      const arrival = cols[1].textContent.trim();
      const departure = cols[2].textContent.trim();
      const platform = cols[3].textContent.trim() || '';
      if (!name || name.includes('Destination')) continue;
      stations.push({ name, arrival, departure, platform });
    }
    if (stations.length === 0) throw new Error('No stations parsed');
    renderJourney(stations);
    // After rendering, fetch live status
    updateLivePosition(stations);
    setInterval(() => updateLivePosition(stations), 15000);
  } catch (err) {
    console.error(err);
    listDiv.innerHTML = '<p style="color:var(--gold-light);text-align:center">Route map unavailable for this train. <a href="/planet-travel/concierge.html">Ask our concierge</a>.</p>';
  }
}

function renderJourney(stations) {
  const listDiv = document.getElementById('journey-list');
  listDiv.innerHTML = '';
  stations.forEach((st, i) => {
    const row = document.createElement('div');
    row.className = 'station-row';
    row.id = 'station-' + i;
    row.innerHTML = `
      <div class="station-dot"></div>
      <div class="station-info">
        <span class="station-name">${st.name}</span>
        ${st.platform ? `<span class="station-platform">PF ${st.platform}</span>` : ''}
      </div>
      <div class="station-time">${st.arrival || '--'} | ${st.departure || '--'}</div>
    `;
    listDiv.appendChild(row);
  });
  // Add train icon (initially hidden)
  const icon = document.createElement('div');
  icon.id = 'train-icon';
  icon.className = 'train-icon';
  icon.innerHTML = '🚂';
  icon.style.display = 'none';
  listDiv.prepend(icon);
}

async function updateLivePosition(stations) {
  try {
    const liveUrl = `https://corsproxy.io/?${encodeURIComponent('https://www.railyatri.in/live-train-running-status/'+trainNo)}`;
    const resp = await fetch(liveUrl);
    if (!resp.ok) return;
    const html = await resp.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const script = doc.querySelector('script[type="application/ld+json"]');
    if (!script) return;
    const data = JSON.parse(script.textContent);
    document.getElementById('train-header').innerHTML = `
      <h2>${data.name || 'Train '+trainNo}</h2>
    `;
    document.getElementById('live-status').innerHTML = `
      <strong>Status:</strong> ${data.trainStatus || 'Running'} |
      <strong>Delay:</strong> ${data.delay || 'On time'}<br>
      <strong>Current Location:</strong> ${data.currentLocation || 'N/A'}<br>
      <small>Updated: ${new Date().toLocaleTimeString()}</small>
    `;
    currentStationName = data.currentLocation || '';
    // Find station index
    const idx = stations.findIndex(s => currentStationName && s.name.includes(currentStationName));
    const icon = document.getElementById('train-icon');
    if (icon && idx >= 0) {
      icon.style.display = 'block';
      const rowElem = document.getElementById('station-' + idx);
      if (rowElem) {
        const top = rowElem.offsetTop;
        icon.style.top = (top + 8) + 'px';
      }
    }
  } catch (e) { console.error(e); }
}

loadRoute();
</script></body></html>
