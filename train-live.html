<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Live Train | Planet&Travel</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="css/luxury.css"><style>.train-map{height:70vh;}</style>
</head><body><nav class="nav-luxury"><a href="/planet-travel/" class="nav-logo">Planet&Travel</a></nav>
<main style="margin-top:100px;"><div id="map" class="train-map"></div>
<div id="info" class="glass" style="padding:1rem;margin:1rem;">Loading train data...</div></main>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const p=new URLSearchParams(window.location.search);const tn=p.get('train');const info=document.getElementById('info');
if(!tn)info.innerHTML='No train specified.';
const map=L.map('map').setView([23.5,78.5],6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© CartoDB',subdomains:'abcd',maxZoom:19}).addTo(map);
let markers=[];
// Coordinate lookup for major stations
const coordLookup={'GWL':[26.2183,78.1828],'INDB':[22.7196,75.8577],'BPL':[23.2599,77.4126],'JHS':[25.4445,78.5680],'AGC':[27.1558,78.0060],'ET':[23.1825,79.9882],'UJN':[23.1765,75.7885],'JBP':[23.1815,79.9864],'NDLS':[28.6419,77.2194],'DBA':[25.9667,78.05],'SHR':[23.4866,79.9143]};
async function update(){
  try{
    const r=await fetch('/planet-travel/train-status/live-trains.json');
    const d=await r.json();
    const t=d.trains?d.trains.find(tr=>tr.trainNo===tn):null;
    if(t){
      info.innerHTML='<h2>'+t.trainName+' ('+t.trainNo+')</h2><p><strong>Status:</strong> '+t.statusNote+'</p><p><strong>Last Station:</strong> '+(t.lastStation||'N/A')+'</p><p><small>Updated: '+new Date(d.updated).toLocaleTimeString()+'</small></p>';
      markers.forEach(m=>map.removeLayer(m));markers=[];
      if(t.currentLat&&t.currentLon){
        const icon=L.divIcon({className:'gold-train-icon',html:'<div style="font-size:24px;">🚂</div>',iconSize:[30,30],iconAnchor:[15,15]});
        markers.push(L.marker([t.currentLat,t.currentLon],{icon}).addTo(map).bindPopup(t.trainName));
      }
    }else{info.innerHTML='<p>Train '+tn+' not currently tracked. <a href="/planet-travel/concierge.html">Ask our concierge</a>.</p>';}
  }catch(e){info.innerHTML='Error loading data.';}
}
update();setInterval(update,30000);
</script></body></html>
