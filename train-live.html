<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Live Train Tracking | Planet&Travel</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="css/luxury.css">
<style>.train-map{height:70vh;margin:1rem 0;}</style>
</head><body><nav class="nav-luxury"><a href="/planet-travel/" class="nav-logo">Planet&Travel</a></nav>
<main style="margin-top:100px;"><div id="map" class="train-map"></div>
<div id="info" class="glass" style="padding:1rem;margin:1rem;">Searching for train...</div>
</main>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const trainNo = params.get('train');
  const info = document.getElementById('info');
  if (!trainNo) info.innerHTML = 'No train number provided.';
  const map = L.map('map').setView([23.5, 78.5], 6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  let markers = [];
  async function update() {
    try {
      const r = await fetch('/planet-travel/train-status/live-trains.json');
      const data = await r.json();
      const t = data.trains.find(tr => tr.number === trainNo);
      if (t) {
        info.innerHTML = `<h2>${t.name} (${t.number})</h2>
          <p><strong>Status:</strong> ${t.status}</p>
          <p><strong>Next station:</strong> ${t.next_station || 'N/A'}</p>
          <p><strong>Delay:</strong> ${t.delay || 'On time'}</p>
          <p><small>Last updated: ${new Date(data.updated).toLocaleTimeString()}</small></p>`;
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        if (t.lat && t.lon) {
          const icon = L.divIcon({
            className: 'gold-train-icon',
            html: '<div style="font-size:24px;">🚂</div>',
            iconSize: [30,30],
            iconAnchor: [15,15]
          });
          const marker = L.marker([t.lat, t.lon], {icon}).addTo(map)
            .bindPopup(`${t.name}<br>${t.status}`);
          markers.push(marker);
        }
      } else {
        info.innerHTML = `<p>Train ${trainNo} not currently tracked. <a href="/planet-travel/concierge.html">Ask our concierge</a>.</p>`;
      }
    } catch(e) {
      info.innerHTML = 'Error loading live data. Please try again.';
    }
  }
  update();
  setInterval(update, 10000);
</script></body></html>
