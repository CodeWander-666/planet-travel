<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Concierge | Planet&Travel</title><link rel="stylesheet" href="css/luxury.css"></head><body><nav class="nav-luxury"><a href="/planet-travel/" class="nav-logo">Planet&Travel</a></nav><main style="margin-top:100px;padding:2rem;"><h1 class="gold-heading">Your Personal Travel Architect</h1><form id="inquiry-form" class="glass" style="max-width:600px;margin:2rem auto;padding:2rem;"><input type="text" id="name" placeholder="Your Name" class="station-input" required><input type="email" id="email" placeholder="Your Email" class="station-input" required><select id="destination" class="station-input"><option value="">Select Destination</option><option>Gwalior</option><option>Indore</option><option>Bhopal</option><option>Jabalpur</option><option>Ujjain</option><option>Khajuraho</option><option>Orchha</option><option>Kanha</option><option>Bandhavgarh</option><option>Pench</option></select><textarea id="details" placeholder="Tell us your dream journey..." class="station-input" rows="4"></textarea><button type="submit" class="btn-gold">Send Inquiry</button></form></main><script>document.getElementById('inquiry-form').addEventListener('submit',function(e){e.preventDefault();const n=document.getElementById('name').value;const em=document.getElementById('email').value;const dest=document.getElementById('destination').value;const det=document.getElementById('details').value;window.location.href='mailto:concierge@planetandtravel.in?subject=Luxury%20Inquiry%20-%20'+encodeURIComponent(dest)+'&body=Name:%20'+encodeURIComponent(n)+'%0AEmail:%20'+encodeURIComponent(em)+'%0ADestination:%20'+encodeURIComponent(dest)+'%0ADetails:%20'+encodeURIComponent(det);});</script></body></html>
