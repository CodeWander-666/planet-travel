name: Update Station Database (Weekly)
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install requests beautifulsoup4
      - run: python automation/generate_station_coords.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🗺️ Update station coordinate database"
          file_pattern: datasets/all-india-stations-with-coords.json
