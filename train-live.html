<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Live Train | Planet&Travel</title>
<link rel="stylesheet" href="css/luxury.css"><style>
  .journey-svg{max-width:100%;height:auto;margin:2rem auto;display:block;}
  .info-panel{max-width:600px;margin:1rem auto;}
</style></head><body><nav class="nav-luxury"><a href="/planet-travel/" class="nav-logo">Planet&Travel</a></nav>
<main style="margin-top:100px;text-align:center;"><div id="info" class="glass info-panel" style="padding:1rem;">Loading journey data...</div>
<svg id="journey-svg" class="journey-svg" viewBox="0 0 900 150" xmlns="http://www.w3.org/2000/svg"></svg>
</main><script>
const p = new URLSearchParams(window.location.search);
const trainNo = p.get('train');
const info = document.getElementById('info');
const svg = document.getElementById('journey-svg');
if (!trainNo) info.innerHTML = 'No train number provided.';

async function loadJourney() {
  try {
    const routeRes = await fetch(`/planet-travel/datasets/train-routes/${trainNo}.json`);
    if (!routeRes.ok) { info.innerHTML = 'Route map unavailable for this train.'; return; }
    const route = await routeRes.json();
    renderSVG(route.stations || []);
    updatePosition();  // poll live location
    setInterval(updatePosition, 15000);
  } catch (e) {
    info.innerHTML = 'Error loading journey data.';
  }
}

function renderSVG(stations) {
  svg.innerHTML = '';
  const spacing = 800 / (stations.length - 1 || 1);
  // track line
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',20); line.setAttribute('y1',75); line.setAttribute('x2',820); line.setAttribute('y2',75);
  line.setAttribute('stroke','#D4AF37'); line.setAttribute('stroke-width',2); line.setAttribute('stroke-dasharray','8 4');
  svg.appendChild(line);
  stations.forEach((st,i) => {
    const cx = 20 + i * spacing;
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',cx); circle.setAttribute('cy',75); circle.setAttribute('r',5); circle.setAttribute('fill','#D4AF37');
    svg.appendChild(circle);
    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x',cx); text.setAttribute('y',55); text.setAttribute('fill','#F5E7B2'); text.setAttribute('font-size','10');
    text.setAttribute('text-anchor','middle'); text.textContent = st.code || st.name;
    svg.appendChild(text);
    // platform info
    if(st.platform){
      const platText = document.createElementNS('http://www.w3.org/2000/svg','text');
      platText.setAttribute('x',cx); platText.setAttribute('y',95); platText.setAttribute('fill','#aaa');
      platText.setAttribute('font-size','9'); platText.setAttribute('text-anchor','middle');
      platText.textContent = 'PF ' + st.platform; svg.appendChild(platText);
    }
  });
  // train icon (initially hidden)
  const trainIcon = document.createElementNS('http://www.w3.org/2000/svg','g');
  trainIcon.innerHTML = '<polygon points="0,-12 18,0 0,12" fill="#D4AF37"/>';
  trainIcon.setAttribute('id','train-icon'); svg.appendChild(trainIcon);
}

async function updatePosition() {
  try {
    const liveRes = await fetch('/planet-travel/train-status/live-trains.json');
    const liveData = await liveRes.json();
    const train = liveData.trains?.find(t => t.trainNo === trainNo);
    const icon = svg.getElementById('train-icon');
    if (!train || !icon) return;
    info.innerHTML = `<h2>${train.trainName}</h2><p><strong>Status:</strong> ${train.statusNote}</p><p><small>Updated: ${new Date(liveData.updated).toLocaleTimeString()}</small></p>`;
    // find station index to position icon
    const routeRes = await fetch(`/planet-travel/datasets/train-routes/${trainNo}.json`);
    if (!routeRes.ok) return;
    const route = await routeRes.json();
    const idx = route.stations.findIndex(s => s.code && train.lastStation?.toUpperCase().includes(s.code.toUpperCase()));
    const spacing = 800 / (route.stations.length - 1 || 1);
    const x = 20 + (idx >= 0 ? idx : 0) * spacing;
    icon.setAttribute('transform', `translate(${x-9}, 63)`);
  } catch (e) { console.error(e); }
}

loadJourney();
</script></body></html>
