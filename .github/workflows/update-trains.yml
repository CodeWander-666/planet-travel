name: Update Live Train Data
on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4
      - run: python automation/scrape_trains.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🚂 Update live train data"
          file_pattern: train-status/
