name: Regenerate Pages on Push
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install jinja2
      - run: python automation/generate_pages.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto‑generate city pages"
          file_pattern: cities/
