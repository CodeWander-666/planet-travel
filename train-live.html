<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Live Train Tracking | Planet&Travel</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="css/luxury.css">
</head>
<body>
  <nav class="nav-luxury"><a href="/planet-travel/" class="nav-logo">Planet&Travel</a></nav>
  <main style="margin-top:100px;">
    <div id="map" style="height:70vh;"></div>
    <div id="info" class="glass" style="padding:1rem; margin:1rem;"></div>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const trainNo = params.get('train');
    document.getElementById('info').innerHTML = 'Loading train data...';
    const map = L.map('map').setView([23.5,78.5],6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {attribution:'...'}).addTo(map);
    setInterval(() => {
      fetch('/planet-travel/train-status/live-trains.json')
        .then(r => r.json())
        .then(data => {
          const t = data.trains.find(tr => tr.number === trainNo);
          if(t) {
            document.getElementById('info').innerHTML = `<h2>${t.name}</h2><p>Status: ${t.status}</p><p>Next: ${t.next_station}</p><p>Delay: ${t.delay}</p>`;
            map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
            L.marker([t.lat, t.lon]).addTo(map).bindPopup(t.status);
          }
        });
    }, 10000);
  </script>
</body>
</html>
